# proxmox-win11-iac Portainer stack — vars live in repo `.env.example`; runtime values via optional `.env`
# file on the host OR Portainer stack Environment (Git stacks never ship `.env`; UI upload does not
# create a path Compose can open — use Stack Environment for every key, or optional file below).
#
# env_file uses required: false so deploy succeeds without a physical `.env` on disk (Compose spec 3.34+).
#
# Workspace bind: ${IAC_REPO_PATH:-.} → /workspace (Portainer Git stack: omit IAC_REPO_PATH).
# OpenTofu SSH optional: SSH_KEY_PATH for host private key (default mounts /dev/null as id_rsa).

services:
  packer:
    image: hashicorp/packer:latest
    container_name: iac-packer
    working_dir: /workspace/packer
    entrypoint: ["/bin/sh", "-lc"]
    command: ["sleep infinity"]
    env_file:
      - path: .env
        required: false
    volumes:
      - ${IAC_REPO_PATH:-.}:/workspace
      - packer_cache:/root/.cache/packer
      - packer_plugins:/root/.config/packer
    environment:
      PACKER_LOG: "1"
    networks:
      - iac
    restart: unless-stopped

  tofu:
    image: ghcr.io/opentofu/opentofu:latest
    container_name: iac-tofu
    working_dir: /workspace/tofu
    entrypoint: ["/bin/sh", "-lc"]
    command: ["sleep infinity"]
    env_file:
      - path: .env
        required: false
    volumes:
      - ${IAC_REPO_PATH:-.}:/workspace
      - tofu_cache:/root/.terraform.d
      - ${SSH_KEY_PATH:-/dev/null}:/root/.ssh/id_rsa:ro
    networks:
      - iac
    restart: unless-stopped

  ansible:
    # Default: cytopia/ansible with pip/galaxy on start. Swap for custom image:
    # image: registry.example.internal/ansible-windows:latest
    image: cytopia/ansible:latest
    container_name: iac-ansible
    working_dir: /workspace/ansible
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        python3 -m pip install --user --break-system-packages pywinrm pypsrp requests-credssp || true;
        ansible-galaxy collection install ansible.windows community.windows || true;
        sleep infinity
    env_file:
      - path: .env
        required: false
    volumes:
      - ${IAC_REPO_PATH:-.}:/workspace
      - ansible_home:/root
    networks:
      - iac
    restart: unless-stopped

networks:
  iac:

volumes:
  packer_cache:
  packer_plugins:
  tofu_cache:
  ansible_home:

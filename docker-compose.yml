# proxmox-win11-iac Portainer stack — vars listed in `.env.example`.
#
# `env_file` (optional): loads a host `.env` next to this file when it exists.
#
# `environment` below: **required for Portainer**. Stack Environment variables are injected when
# Compose substitutes `${VAR}` at deploy time; they do not automatically appear in containers unless
# listed here (uploading a dotenv in the UI still supplies vars for this substitution).
#
# Workspace: ${IAC_REPO_PATH:-.} → /workspace. SSH_KEY_PATH optional for OpenTofu host key.

services:
  packer:
    image: hashicorp/packer:latest
    container_name: iac-packer
    working_dir: /workspace/packer
    entrypoint: ["/bin/sh", "-lc"]
    command: ["sleep infinity"]
    env_file:
      - path: .env
        required: false
    volumes:
      - ${IAC_REPO_PATH:-.}:/workspace
      - packer_cache:/root/.cache/packer
      - packer_plugins:/root/.config/packer
    environment:
      PACKER_LOG: "1"
      TF_VAR_proxmox_api_token: ${TF_VAR_proxmox_api_token}
      PKR_VAR_proxmox_token: ${PKR_VAR_proxmox_token:-}
      WINRM_PASSWORD: ${WINRM_PASSWORD}
      PKR_VAR_proxmox_url: ${PKR_VAR_proxmox_url}
      PKR_VAR_proxmox_node: ${PKR_VAR_proxmox_node}
      PKR_VAR_proxmox_username: ${PKR_VAR_proxmox_username}
      PKR_VAR_template_vm_id: ${PKR_VAR_template_vm_id}
      PKR_VAR_template_name: ${PKR_VAR_template_name}
      PKR_VAR_iso_file: ${PKR_VAR_iso_file}
      PKR_VAR_virtio_iso_file: ${PKR_VAR_virtio_iso_file}
      PKR_VAR_vm_storage: ${PKR_VAR_vm_storage}
      PKR_VAR_iso_storage: ${PKR_VAR_iso_storage}
      PKR_VAR_bridge: ${PKR_VAR_bridge}
      PKR_VAR_winrm_username: ${PKR_VAR_winrm_username}
    networks:
      - iac
    restart: unless-stopped

  tofu:
    image: ghcr.io/opentofu/opentofu:latest
    container_name: iac-tofu
    working_dir: /workspace/tofu
    entrypoint: ["/bin/sh", "-lc"]
    command: ["sleep infinity"]
    env_file:
      - path: .env
        required: false
    volumes:
      - ${IAC_REPO_PATH:-.}:/workspace
      - tofu_cache:/root/.terraform.d
      - ${SSH_KEY_PATH:-/dev/null}:/root/.ssh/id_rsa:ro
    environment:
      TF_VAR_proxmox_endpoint: ${TF_VAR_proxmox_endpoint}
      TF_VAR_proxmox_api_token: ${TF_VAR_proxmox_api_token}
      TF_VAR_proxmox_node: ${TF_VAR_proxmox_node}
      TF_VAR_datastore: ${TF_VAR_datastore}
      TF_VAR_win11_template_id: ${TF_VAR_win11_template_id}
      TF_VAR_vm_id: ${TF_VAR_vm_id}
      TF_VAR_vm_name: ${TF_VAR_vm_name}
      TF_VAR_bridge: ${TF_VAR_bridge}
    networks:
      - iac
    restart: unless-stopped

  ansible:
    # Default: cytopia/ansible with pip/galaxy on start. Swap for custom image:
    # image: registry.example.internal/ansible-windows:latest
    image: cytopia/ansible:latest
    container_name: iac-ansible
    working_dir: /workspace/ansible
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >
        python3 -m pip install --user --break-system-packages pywinrm pypsrp requests-credssp || true;
        ansible-galaxy collection install ansible.windows community.windows || true;
        sleep infinity
    env_file:
      - path: .env
        required: false
    volumes:
      - ${IAC_REPO_PATH:-.}:/workspace
      - ansible_home:/root
    environment:
      WINDOWS_ADMIN_PASSWORD: ${WINDOWS_ADMIN_PASSWORD}
    networks:
      - iac
    restart: unless-stopped

networks:
  iac:

volumes:
  packer_cache:
  packer_plugins:
  tofu_cache:
  ansible_home:
